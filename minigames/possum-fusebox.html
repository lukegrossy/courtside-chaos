<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>The Fuse Box</title>
<style>
  :root{
    --bg:#14110f; --panel:#1d1916; --ink:#2b241a;
    --kraft:#d8c7a3; --kraft2:#c9b48c; --amber:#f0c987; --amberdim:#9a824f;
    --red:#d64b3a; --green:#6fae55; --line:#3a332a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);}
  body{
    font-family:"Courier New",Courier,monospace;
    color:var(--amber);
    display:flex;justify-content:center;
    padding:14px 12px 26px;
    min-height:100%;
    touch-action:manipulation;
    -webkit-user-select:none;user-select:none;
  }
  .wrap{width:100%;max-width:420px;}

  /* ---- Sandra, live — spoken over black, matching the main game's
     Courier New / bold / white dialogue styling, no note-pad chrome ---- */
  .note{
    background:#0c0a08;
    color:#f5f2ea;
    font-family:"Courier New",Courier,monospace;
    font-weight:700;
    padding:14px 4px 4px;
    line-height:1.5;
    font-size:15px;
  }
  .note p{margin:0;}
  .note .stamp{color:#8a3327;font-weight:bold;}

  /* ---- Screens ---- */
  .screen{display:none;}
  .screen.on{display:block;}

  /* ---- Buttons (owner calls) ---- */
  .calls{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
  .call{
    display:flex;align-items:flex-start;gap:11px;
    background:var(--panel);border:2px solid var(--line);
    border-radius:3px;padding:12px 13px;text-align:left;
    color:var(--amber);font-family:inherit;font-size:14px;line-height:1.35;
    cursor:pointer;transition:border-color .1s,transform .04s;
  }
  .call:active{transform:translateY(1px);}
  .call:hover{border-color:var(--amberdim);}
  .call .k{
    font-weight:bold;color:#14110f;background:var(--amber);
    width:26px;min-width:26px;height:26px;border-radius:2px;
    display:flex;align-items:center;justify-content:center;font-size:15px;
  }
  .call .t b{color:#fff;}
  .call .cost{color:var(--red);font-weight:bold;}
  .call .free{color:var(--green);font-weight:bold;}
  .call .sub{display:block;color:var(--amberdim);font-size:12px;margin-top:3px;}

  /* ---- HUD ---- */
  #stage{margin-top:12px;}
  canvas#c{
    display:block;width:100%;image-rendering:pixelated;image-rendering:crisp-edges;
    background:#14110f;border:2px solid var(--line);border-radius:3px;
  }
  .hud{
    margin-top:9px;display:flex;justify-content:space-between;align-items:center;
    font-size:12px;letter-spacing:1px;
  }
  .hud .lab{color:var(--amberdim);}
  .strikes{display:inline-flex;gap:5px;}
  .strikes span{
    width:15px;height:15px;border:2px solid var(--line);border-radius:2px;
    display:inline-block;position:relative;
  }
  .strikes span.hit{border-color:var(--red);background:rgba(214,75,58,.18);}
  .strikes span.hit::after{content:"✕";position:absolute;inset:-3px 0 0;color:var(--red);text-align:center;font-size:13px;font-weight:bold;}
  .crate{display:inline-flex;gap:4px;}
  .crate span{
    width:14px;height:14px;border:1px solid #5a4a2c;border-radius:2px;background:#221c14;
  }
  .crate span.full{background:#8a7a58;border-color:#a89468;}
  #funds{color:var(--amber);font-weight:bold;}

  .hint{
    margin-top:9px;text-align:center;font-size:11px;letter-spacing:1px;
    color:var(--amberdim);min-height:14px;
  }
  .hint b.g{color:var(--green);}
  .hint b.r{color:var(--red);}

  .mute{
    position:fixed;top:10px;right:12px;background:none;border:none;
    color:var(--amberdim);font-size:16px;cursor:pointer;padding:4px;
  }
  .replay{
    margin-top:14px;width:100%;background:var(--panel);color:var(--amber);
    border:2px solid var(--line);border-radius:3px;padding:12px;
    font-family:inherit;font-size:13px;letter-spacing:2px;cursor:pointer;
  }
  .replay:active{transform:translateY(1px);}
</style>
</head>
<body>
<button class="mute" id="mute" aria-label="sound">♪</button>
<div class="wrap">

  <!-- setup screen removed: the DIY/pest-control decision now lives in the
       main game's own decision card. This iframe opens straight into play. -->

  <!-- ===================== GAME ===================== -->
  <div class="screen on" id="game">
    <div class="note">
      <p id="log">&ldquo;Six babies. One mother. She only watches one at a time &mdash; that's the whole trick. Take the ones she isn't looking at.&rdquo;</p>
    </div>
    <div id="stage"><canvas id="c" width="192" height="160"></canvas></div>
    <div class="hud">
      <span><span class="lab">STRIKES </span><span class="strikes" id="strikes"><span></span><span></span><span></span></span></span>
    </div>
    <div class="hud">
      <span class="lab">POSSUMS CAUGHT</span>
      <span class="crate" id="crate"><span></span><span></span><span></span><span></span><span></span><span></span></span>
    </div>
    <div class="hint" id="hint">Tap a <b class="g">green</b> one. Never the <b class="r">red</b> one.</div>
  </div>

  <!-- end screen removed: win/lose now reported to the parent game via
       postMessage, which shows Sandra's commentary and handles the retry
       loop and cash in the main dashboard, not inside this iframe. -->

</div>

<script>
"use strict";
(function(){
  // ---------- audio (tiny, optional) ----------
  var AC=null, muted=false;
  function actx(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(AC&&AC.state==="suspended")AC.resume(); return AC; }
  function beep(freq,dur,type,vol){
    if(muted) return; var c=actx(); if(!c) return;
    var o=c.createOscillator(), g=c.createGain();
    o.type=type||"square"; o.frequency.value=freq;
    g.gain.value=(vol||0.05); o.connect(g); g.connect(c.destination);
    var t=c.currentTime; o.start(t); g.gain.setValueAtTime(g.gain.value,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.stop(t+dur+0.02);
  }
  var sGrab=function(){beep(680,0.08,"square",0.04);beep(920,0.06,"square",0.03);};
  var sChomp=function(){beep(120,0.16,"sawtooth",0.09);};
  var sWin=function(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){beep(f,0.12,"square",0.05);},i*90);});};
  document.getElementById("mute").onclick=function(){muted=!muted;this.textContent=muted?"·":"♪";this.style.color=muted?"#5a4a2c":"";};

  // ---------- canvas ----------
  var cv=document.getElementById("c"), ctx=cv.getContext("2d");
  ctx.imageSmoothingEnabled=false;
  var W=192,H=160;
  function r(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}
  function poly(points,col){
    ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(Math.round(points[0][0]),Math.round(points[0][1]));
    for(var i=1;i<points.length;i++)ctx.lineTo(Math.round(points[i][0]),Math.round(points[i][1]));
    ctx.closePath();ctx.fill();
  }
  function line(points,col,width){
    ctx.strokeStyle=col;ctx.lineWidth=width||1;ctx.lineCap="square";ctx.lineJoin="miter";
    ctx.beginPath();ctx.moveTo(Math.round(points[0][0]),Math.round(points[0][1]));
    for(var i=1;i<points.length;i++)ctx.lineTo(Math.round(points[i][0]),Math.round(points[i][1]));
    ctx.stroke();
  }

  // ---------- palette ----------
  // Pulled toward the locked Courtside Chaos look: cold navy-black structure,
  // dirty steel, tobacco-brown rust and a single warm work-light.
  var COL={
    void:"#050A10", navy:"#0e131c", navy2:"#161C29", navy3:"#20293A",
    wall:"#171612", wallL:"#29251d", wallD:"#0b0b09",
    steel0:"#17191b", steel1:"#292c2e", steel2:"#414346", steel3:"#66645f", steel4:"#918878",
    ceramicD:"#51493f", ceramic:"#807566", ceramicL:"#b8a98f",
    copperD:"#4d2109", copper:"#8a3d0d", copperL:"#c06b21", copperHi:"#d9a460",
    rustD:"#3b1908", rust:"#71300d", rustL:"#a65118",
    paperD:"#5d4b2d", paper:"#9f865d", paperL:"#c7ad7c",
    body0:"#25252a", body1:"#3c3d43", body2:"#626168", body3:"#8a8580", body4:"#b7aaa1", bodyWarm:"#a48770",
    bellyD:"#81766f", belly:"#b9aaa0", bellyL:"#d6c8bc",
    pinkD:"#6d3740", pink:"#a75b65", pinkL:"#d08a91",
    eye:"#0b0908", shine:"#f1e5d5", nose:"#c77d85",
    red:"#d64b3a", redD:"#76251f", green:"#6fae55", greenD:"#355e2b",
    amber:"#f0c987", amberD:"#9a824f", spark:"#f7e08a",
    web:"rgba(184,174,156,0.26)", smoke:"rgba(10,8,6,0.62)", lamp:"rgba(246,180,90,",
    whisker:"rgba(224,206,186,0.50)"
  };

  // ---------- slots / difficulty ----------
  var MX=101,MY=88;
  // The pups occupy believable ledges and wire bundles instead of radial spokes.
  var slots=[
    {x:47,y:43,face:1},{x:39,y:91,face:1},{x:67,y:128,face:1},
    {x:127,y:130,face:-1},{x:157,y:94,face:-1},{x:157,y:47,face:-1}
  ];
  var babies;
  var hotSet=[];
  var strikes,rescued,phase;
  var pup={x:MX,y:MY-8},pupTo={x:MX,y:MY-8};
  var lunge={x:0,y:0},shake=0,grabAnim=null,particles=[];
  var fakeFlashIds=[],fakeFlashTimer=0,fakeCooldown=360;
  var distractionUsed=false,targetSerial=0;
  var rushSteps=0,rushTimer=0;
  var motherFaceDir=1;
  var reaimTimer=0,reaimInterval=900,blink=0,tPrev=0,hintShown=true,doubleWarned=false;

  var motes=[
    {x:25,y:22,p:0},{x:70,y:18,p:1.4},{x:170,y:33,p:2.7},
    {x:31,y:127,p:0.6},{x:144,y:118,p:3.3},{x:99,y:145,p:2.1}
  ];

  function nextInterval(){
    // Brutal tail, but never ambiguous: every real danger state remains explicitly marked.
    var base=[900,650,470,330,245,760][Math.min(rescued,5)];
    base-=strikes*24;
    return Math.max(220,base+(Math.random()*54-27));
  }
  function reset(){
    babies=slots.map(function(s,i){return {id:i,x:s.x,y:s.y,face:s.face,present:true};});
    strikes=0;rescued=0;phase="idle";grabAnim=null;particles=[];shake=0;lunge.x=0;lunge.y=0;
    fakeFlashIds=[];fakeFlashTimer=0;fakeCooldown=270+Math.random()*300;
    distractionUsed=false;targetSerial=0;rushSteps=0;rushTimer=0;
    motherFaceDir=1;
    reaimTimer=0;reaimInterval=980;hintShown=true;doubleWarned=false;
    pickTargets([]);pup.x=pupTo.x;pup.y=pupTo.y;paintHUD();
  }
  function presentBabies(){return babies.filter(function(b){return b.present;});}
  function babyById(id){for(var i=0;i<babies.length;i++)if(babies[i].id===id)return babies[i];return null;}
  function aimAt(ids){
    if(!ids.length){pupTo.x=MX;pupTo.y=MY-8;return;}
    var sx=0,sy=0,n=0;
    ids.forEach(function(id){var b=babyById(id);if(b&&b.present){sx+=b.x;sy+=b.y;n++;}});
    if(n){pupTo.x=sx/n;pupTo.y=sy/n;}
  }
  function adjacentSlots(a,b){var d=Math.abs(a-b);return d===1||d===5;}
  function startDistraction(){
    var p=presentBabies();
    if(distractionUsed||p.length<4)return false;
    var pairs=[];
    for(var i=0;i<p.length;i++)for(var j=i+1;j<p.length;j++)if(!adjacentSlots(p[i].id,p[j].id))pairs.push([p[i].id,p[j].id]);
    if(!pairs.length)return false;
    var pair=pairs[(Math.random()*pairs.length)|0];
    var real=pair[(Math.random()*2)|0],fake=pair[0]===real?pair[1]:pair[0];
    hotSet=[real];fakeFlashIds=[real,fake];fakeFlashTimer=175;fakeCooldown=420;distractionUsed=true;
    targetSerial++;aimAt(hotSet);reaimTimer=0;reaimInterval=255;
    return true;
  }
  function startFakeOut(){
    if(fakeFlashTimer>0||phase!=="idle")return;
    var safe=presentBabies().filter(function(b){return hotSet.indexOf(b.id)===-1;});
    if(!safe.length)return;
    for(var i=safe.length-1;i>0;i--){var j=(Math.random()*(i+1))|0,t=safe[i];safe[i]=safe[j];safe[j]=t;}
    var n=rescued>=2&&safe.length>1&&Math.random()<0.58?2:1;
    fakeFlashIds=safe.slice(0,n).map(function(b){return b.id;});fakeFlashTimer=88;
  }
  function pickTargets(avoidIds){
    var p=presentBabies();fakeFlashIds=[];fakeFlashTimer=0;
    if(p.length<=1){hotSet=[];rushSteps=0;pupTo.x=MX;pupTo.y=MY-7;return;}

    var count;
    if(rescued===0)count=Math.random()<0.35?2:1;
    else if(rescued===1)count=Math.min(p.length-1,Math.random()<0.72?3:2);
    else count=p.length-1; // from four pups onward, there is usually one safe read only
    count=Math.max(1,Math.min(count,p.length-1));

    var pool=p.map(function(b){return b.id;}).filter(function(id){return avoidIds.indexOf(id)===-1;});
    if(pool.length<count)pool=p.map(function(b){return b.id;});
    for(var i=pool.length-1;i>0;i--){var j=(Math.random()*(i+1))|0,t=pool[i];pool[i]=pool[j];pool[j]=t;}
    hotSet=pool.slice(0,count);targetSerial++;aimAt(hotSet);

    if(hotSet.length>=2&&!doubleWarned){
      doubleWarned=true;
      say("She's watching two now. I don't recall teaching her that.");
    }
    reaimInterval=nextInterval();
  }
  function startRush(){
    if(rescued<2||presentBabies().length<3)return false;
    rushSteps=rescued>=4?4:3;rushTimer=0;
    pickTargets(hotSet);
    return true;
  }

  // ---------- drawing helpers ----------
  var BAYER4=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
  var staticLayer=null;
  function ditherPixels(x,y,w,h,col,step,density,ox,oy){
    // One hard 1px sample per ordered grid cell: cheaper and less blotchy than per-pixel tests.
    step=step||2; density=density==null?8:Math.max(0,Math.min(16,density));
    var x0=Math.floor(x),y0=Math.floor(y),x1=Math.floor(x+w),y1=Math.floor(y+h);
    ctx.fillStyle=col;
    for(var yy=y0,gy=0;yy<y1;yy+=step,gy++){
      for(var xx=x0,gx=0;xx<x1;xx+=step,gx++){
        var bx=((gx+(ox||0))%4+4)%4, by=((gy+(oy||0))%4+4)%4;
        if(BAYER4[by][bx]<density)ctx.fillRect(xx,yy,1,1);
      }
    }
  }
  function ditherBox(x,y,w,h,a,b,step,density){
    r(x,y,w,h,a);
    ditherPixels(x,y,w,h,b,step||3,density==null?8:density,0,0);
  }
  function clipPoly(points){
    ctx.beginPath();ctx.moveTo(Math.round(points[0][0]),Math.round(points[0][1]));
    for(var i=1;i<points.length;i++)ctx.lineTo(Math.round(points[i][0]),Math.round(points[i][1]));
    ctx.closePath();
  }
  function polyBounds(points){
    var minX=points[0][0],maxX=minX,minY=points[0][1],maxY=minY;
    for(var i=1;i<points.length;i++){
      var p=points[i]; if(p[0]<minX)minX=p[0]; if(p[0]>maxX)maxX=p[0]; if(p[1]<minY)minY=p[1]; if(p[1]>maxY)maxY=p[1];
    }
    return {x:Math.floor(minX),y:Math.floor(minY),w:Math.ceil(maxX-minX+1),h:Math.ceil(maxY-minY+1)};
  }
  function ditherPoly(points,a,b,step,density,ox,oy){
    poly(points,a);
    var bb=polyBounds(points);
    ctx.save();clipPoly(points);ctx.clip();
    ditherPixels(bb.x,bb.y,bb.w,bb.h,b,step||2,density==null?8:density,ox||0,oy||0);
    ctx.restore();
  }
  function chip(x,y,col){r(x,y,1,1,col);r(x+1,y,1,1,col);}
  function scratchPairs(list,bright,dark){
    for(var i=0;i<list.length;i++){var p=list[i];r(p[0],p[1],1,1,bright);r(p[0]+p[2],p[1]+p[3],1,1,dark);} 
  }
  function ceramicTexture(x,y,w,h){
    for(var yy=y+1;yy<y+h-1;yy+=3){
      for(var xx=x+1+(((yy-y)/3)|0)%2;xx<x+w-1;xx+=4){
        r(xx,yy,1,1,COL.ceramicL);
        if(xx+1<x+w-1&&yy+1<y+h-1)r(xx+1,yy+1,1,1,COL.ceramicD);
      }
    }
    r(x+w-3,y+2,1,1,COL.shine);
  }
  function furSweep(baseX,baseY,marks,colA,colB){
    for(var i=0;i<marks.length;i++){
      var m=marks[i], col=i%3===0?colB:colA;
      r(baseX+m[0],baseY+m[1],1,1,col);
      if(m.length>2)r(baseX+m[0]+m[2],baseY+m[1]+m[3],1,1,col);
    }
  }
  function aaSweep(baseX,baseY,pix,col){
    for(var i=0;i<pix.length;i++)r(baseX+pix[i][0],baseY+pix[i][1],1,1,col);
  }
  function lampDither(){
    // Ordered-dither falloff instead of gradient shading.
    ditherBox(0,0,76,54,COL.wall,COL.paperD,2,3);
    ditherBox(0,0,108,78,COL.wall,COL.wallL,3,5);
    ditherBox(0,0,142,98,COL.wall,COL.paperD,4,1);
    ditherBox(8,6,48,28,COL.wall,COL.paper,3,1);
  }
  function drawWall(){
    r(0,0,W,H,COL.wallD);
    ditherBox(0,0,W,H,COL.wall,COL.wallL,4,4);
    lampDither();
    // cold lower wall shadow and warm lamp contamination
    ditherBox(0,112,W,48,COL.void,COL.navy2,3,5);
    chip(12,9,COL.paperD);chip(21,14,COL.paperD);chip(33,20,COL.wallL);chip(52,16,COL.paperD);
    chip(74,31,COL.wallL);chip(98,25,COL.paperD);chip(141,35,COL.wallL);chip(170,28,COL.wallL);
    scratchPairs([[16,41,1,0],[57,36,1,1],[102,19,1,0],[152,49,1,1],[84,69,1,0],[45,97,1,1]],COL.wallL,COL.wallD);
  }
  function drawCabinetDoor(){
    // Open door, foreshortened on the left. Texture sells the painted-VGA surface.
    var p0=[[1,12],[28,18],[28,148],[1,157]], p1=[[3,15],[24,20],[24,145],[3,151]], p2=[[5,18],[21,22],[21,141],[5,147]];
    poly(p0,COL.steel0);
    ditherPoly(p1,COL.steel2,COL.steel3,3,6,1,0);
    ditherPoly(p2,COL.steel1,COL.steel2,3,5,0,1);
    scratchPairs([[7,24,1,0],[9,54,1,1],[13,82,1,0],[8,118,1,1],[17,138,1,0]],COL.steel4,COL.steel0);
    r(23,31,5,24,COL.steel0);r(24,34,3,18,COL.steel4);
    r(23,110,5,24,COL.steel0);r(24,113,3,18,COL.steel4);
    scratchPairs([[24,39,1,0],[24,118,1,0]],COL.steel3,COL.steel0);
    // faded shock label and a dirty pencilled service note
    poly([[7,47],[19,49],[18,73],[7,71]],COL.paperD);
    ditherPoly([[8,49],[18,51],[17,69],[8,68]],COL.paper,COL.paperL,2,5,0,0);
    r(10,53,6,2,COL.rustD);r(11,57,4,5,COL.rustD);r(9,64,7,1,COL.paperD);
    r(7,86,10,1,COL.steel3);r(8,89,7,1,COL.steel3);r(7,92,9,1,COL.steel3);
  }
  function drawCabinetShell(){
    // Deep steel lip with an irregular upper edge and cold interior.
    poly([[25,9],[188,9],[191,13],[191,155],[27,155],[23,151],[23,16]],COL.steel0);
    poly([[28,11],[186,11],[188,14],[188,152],[29,152],[26,149],[26,17]],COL.steel3);
    poly([[31,15],[183,15],[185,18],[185,148],[31,148],[29,146],[29,19]],COL.steel1);
    r(31,18,151,128,COL.void);
    r(31,18,151,2,COL.steel4);r(31,20,2,126,COL.steel2);r(33,144,149,2,COL.steel0);r(180,20,2,124,COL.steel0);
    // latch tongue and screw heads
    r(184,68,7,18,COL.steel0);r(185,71,5,12,COL.steel4);r(187,74,2,6,COL.steel1);
    [[35,22],[177,22],[35,141],[177,141]].forEach(function(p){r(p[0],p[1],3,3,COL.steel4);r(p[0]+1,p[1]+1,1,1,COL.steel0);});
  }
  function drawBackplate(){
    // water stain, heat bloom and old paper all behind the live equipment
    ctx.save();ctx.globalAlpha=0.58;
    poly([[92,22],[126,20],[142,29],[136,47],[145,59],[130,70],[94,63],[84,47]],COL.rustD);
    r(94,26,37,2,COL.rust);r(101,31,32,1,COL.rustL);r(108,37,22,1,COL.rust);

    staticLayer.width=W;staticLayer.height=H;
    var oldCtx=ctx, sc=staticLayer.getContext("2d");
    sc.imageSmoothingEnabled=false;ctx=sc;
    drawWall();drawCabinetDoor();drawCabinetShell();drawBackplate();drawFuseBank();drawBusAndTerminals();drawWiring();drawGrime();drawWeb();
    ctx=oldCtx;
  }
  function draw(){
    if(!staticLayer)buildStaticLayer();
    if(staticLayer)ctx.drawImage(staticLayer,0,0); else {drawWall();drawCabinetDoor();drawCabinetShell();drawBackplate();drawFuseBank();drawBusAndTerminals();drawWiring();drawGrime();drawWeb();}
    var sx=(Math.random()*2-1)*shake,sy=(Math.random()*2-1)*shake;
    ctx.save();ctx.translate(sx,sy);
    ctx.fillStyle="rgba(240,201,135,0.22)";
    motes.forEach(function(m){var my=m.y+Math.sin(Date.now()/930+m.p)*4;ctx.fillRect(Math.round(m.x),Math.round(my),1,1);});
    babies.forEach(function(b){if(b.present)drawBaby(b.x,b.y,hotSet.indexOf(b.id)!==-1,false,b.id,fakeFlashIds.indexOf(b.id)!==-1);});
    var breathe=Math.sin(Date.now()/520)*1.0;drawMother(MX+lunge.x,MY+lunge.y+breathe);
    if(grabAnim){ctx.save();ctx.globalAlpha=Math.max(0,grabAnim.a);drawBaby(grabAnim.x,grabAnim.y,false,true,grabAnim.id,false);ctx.restore();}
    drawParticles();ctx.restore();
  }

  // ---------- loop ----------
  function frame(t){
    try{
      var dt=Math.min(50,t-tPrev)||16;tPrev=t;
      pup.x+=(pupTo.x-pup.x)*0.24;pup.y+=(pupTo.y-pup.y)*0.24;
      blink+=dt/1000;if(blink>3.0)blink=0;
      if(phase==="idle"&&presentBabies().length>=2){
        if(rushSteps>0){
          rushTimer+=dt;
          var rushGap=rescued>=4?215:245;
          if(rushTimer>=rushGap){rushTimer=0;rushSteps--;pickTargets(hotSet);}
        }else{
          reaimTimer+=dt;
          if(reaimTimer>reaimInterval){
            reaimTimer=0;
            if(rescued>=2&&Math.random()<(rescued>=4?0.72:0.42))startRush();
            else pickTargets(hotSet);
          }
        }
      }
      if(fakeFlashTimer>0){
        fakeFlashTimer-=dt;if(fakeFlashTimer<=0){fakeFlashTimer=0;fakeFlashIds=[];}
      }else if(phase==="idle"&&presentBabies().length>=2){
        fakeCooldown-=dt;
        if(fakeCooldown<=0){
          if(Math.random()<(rescued>=2?0.92:0.68))startFakeOut();
          fakeCooldown=(rescued>=2?180:280)+Math.random()*(rescued>=2?260:360);
        }
      }
      updateParticles(dt);
      lunge.x*=0.78;lunge.y*=0.78;if(Math.abs(lunge.x)<0.3)lunge.x=0;if(Math.abs(lunge.y)<0.3)lunge.y=0;
      shake*=0.84;if(shake<0.3)shake=0;
      if(grabAnim){grabAnim.y+=grabAnim.vy;grabAnim.vy*=0.98;grabAnim.a-=0.035;if(grabAnim.a<=0){grabAnim=null;afterGrab();}}
      draw();
    }catch(err){console.error("frame error:",err);}
    requestAnimationFrame(frame);
  }

  // ---------- interaction ----------
  cv.addEventListener("pointerdown",function(e){
    e.preventDefault(); actx();
    if(phase!=="idle") return;
    var rect=cv.getBoundingClientRect();
    var ix=(e.clientX-rect.left)/rect.width*W;
    var iy=(e.clientY-rect.top)/rect.height*H;
    var hit=null, best=14;
    presentBabies().forEach(function(b){
      var d=Math.hypot(ix-b.x,iy-b.y); if(d<best){best=d;hit=b;}
    });
    if(!hit) return;
    motherFaceDir = hit.x >= MX ? 1 : -1;
    if(hintShown){document.getElementById("hint").style.opacity=".35";hintShown=false;}
    if(hotSet.indexOf(hit.id)!==-1){ bite(hit); } else { grab(hit); }
  },{passive:false});

  function grab(b){
    phase="lock"; sGrab();
    spawnGrabBurst(b.x,b.y);
    b.present=false;
    grabAnim={x:b.x,y:b.y,vy:-1.6,a:1,id:b.id};
    rescued++; paintHUD(); logLine("grab");
  }
  function afterGrab(){
    if(rescued>=6){ win(); return; }
    phase="idle";
    // One mid-game read test: two separated pups flash, but only the red-ringed one is real.
    if(rescued===2 && startDistraction()) return;
    pickTargets(hotSet); reaimTimer=0;
  }
  function bite(b){
    phase="lock"; sChomp();
    // mother lunges toward the hot baby
    var dx=b.x-MX, dy=b.y-MY, d=Math.max(1,Math.hypot(dx,dy));
    lunge.x=dx/d*11; lunge.y=dy/d*8; shake=4.5;
    spawnBiteSpark(b.x,b.y);
    strikes++; paintHUD(); logLine("bite");
    setTimeout(function(){
      if(strikes>=3){ lose(); return; }
      pickTargets(hotSet); reaimTimer=0; phase="idle";
    },420);
  }

  // ---------- HUD + log ----------
  function paintHUD(){
    var st=document.getElementById("strikes").children;
    for(var i=0;i<3;i++) st[i].className=(i<strikes)?"hit":"";
    var cr=document.getElementById("crate").children;
    for(var j=0;j<6;j++) cr[j].className=(j<rescued)?"full":"";
  }
  function say(text){ document.getElementById("log").innerHTML = "&ldquo;"+text+"&rdquo;"; }
  var grabLines=[
    "One. That's one.",
    "Two. She saw that. She's allowing it.",
    "Three. Halfway. Don't get proud.",
    "Four. Steady hands. Whoever taught you that, thank them.",
    "Five. One left, and she's stopped watching. I can't tell if that's trust or a trap.",
    "Six. That's all of them. Vern's going to want proof, and I don't blame him."
  ];
  var biteLines=[
    "That's a bite. Run it under cold water. We're not stopping.",
    "Second bite. One more of those and I'm making the call for you."
  ];
  function logLine(kind){
    if(kind==="grab") say(grabLines[Math.min(rescued-1,grabLines.length-1)]);
    else say(biteLines[Math.min(strikes-1,biteLines.length-1)]);
  }

  function show(id){
    ["game"].forEach(function(s){document.getElementById(s).classList.toggle("on",s===id);});
  }

  function endNote(html){ /* commentary now lives in the parent game */ }

  function win(){
    phase="lock"; sWin();
    setTimeout(function(){
      window.parent.postMessage({type:'possum-result', result:'win'}, '*');
    }, 500);
  }
  function lose(){
    phase="lock";
    setTimeout(function(){
      window.parent.postMessage({type:'possum-result', result:'lose'}, '*');
    }, 500);
  }

  // ---------- wire up ----------
  reset(); // ensure babies/target exist before the render loop's first tick
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
